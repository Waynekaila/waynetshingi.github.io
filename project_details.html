        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Space Grotesk', sans-serif;
            scroll-behavior: smooth;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .project-image {
            max-height: 400px;
            object-fit: cover;
        }

<body class="gradient-bg">
    <nav class="fixed w-full z-50 bg-white/80 shadow-sm">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between h-16">

                    <a href="project_page.html" class="text-xl font-bold text-gray-800 hover:text-indigo-600">&larr; Project Details</a>
                </div>
                <div class="hidden md:flex items-center space-x-8">

                    <a href="aboutme.html" class="text-gray-700 hover:text-indigo-600 font-medium">Skills</a>
                    <a href="contact.html" class="text-gray-700 hover:text-indigo-600 font-medium">Contact</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-20 px-4">
        <div id="loading-state" class="text-center py-20 text-gray-600">Chargement des détails du projet...</div>
        
        <div id="main-content" class="max-w-6xl mx-auto hidden">
            <div class="text-center mb-16">
                <h1 id="project-title" class="text-4xl font-bold text-gray-800 mb-4">Chargement...</h1>
                <p id="project-desc" class="text-lg text-gray-600 max-w-2xl mx-auto"></p>
            </div>

            <div class="flex flex-col md:flex-row gap-8">
                <div class="md:w-1/2">
                    <img id="project-img" src="https://placehold.co/800x400" alt="Project Image" class="project-image w-full rounded-lg shadow-md" />
                </div>
                <div class="md:w-1/2">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Project Overview</h2>
                    <p id="project-details" class="text-gray-600 mb-6 whitespace-pre-line"></p>
                    
                    <h3 class="text-xl font-semibold text-gray-800 mb-2">Skills Used</h3>
                    <div id="project-skills" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <div class="mt-12">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">Gallery</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <img src="https://placehold.co/400x300" alt="Gallery Image 1" class="w-full h-48 object-cover rounded-lg shadow-md" />
                    <img src="https://placehold.co/400x300" alt="Gallery Image 2" class="w-full h-48 object-cover rounded-lg shadow-md" />
                    <img src="https://placehold.co/400x300" alt="Gallery Image 3" class="w-full h-48 object-cover rounded-lg shadow-md" />
                </div>
            </div>

            <div class="mt-12">
                <h2 class="text-2xl font-semibold text-gray-800 mb-4">Contact for Inquiries</h2>
                <form id="contactForm" class="bg-white rounded-lg shadow-md p-8">
                    <div class="mb-6">
                        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                        <input type="text" id="name" name="name" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-transparent" required>
                    </div>

                    <div class="mb-6">
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" name="email" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-transparent" required>
                    </div>

                    <div class="mb-6">
                        <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                        <textarea id="message" name="message" rows="4" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:border-transparent" required></textarea>
                    </div>

                    <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition duration-300">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Pied de page -->
    <footer class="bg-gray-800 text-white py-8 px-4">
    <div class="max-w-6xl mx-auto">

            </div>

            <!-- Centre : Réseaux sociaux -->

                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.025-3.039-1.852-3.039-1.853 0-2.136 1.445-2.136 2.939v5.669H9.355V9h3.414v1.561h.047c.476-.9 1.637-1.852 3.368-1.852 3.601 0 4.268 2.371 4.268 5.456v6.287zM5.337 7.433a2.07 2.07 0 110-4.14 2.07 2.07 0 010 4.14zm1.777 13.02H3.56V9h3.554v11.453zM22.225 0H1.771C.792 0 0 .774 0 1.73v20.54C0 23.225.792 24 1.771 24h20.451C23.207 24 24 23.225 24 22.27V1.73C24 .774 23.207 0 22.225 0z"/>

            <!-- Droite : Copyright -->
            <div>
                <p class="text-gray-400">&copy; 2025 Tous droits réservés</p>

</footer>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = "https://nhrtqzwxrhvldmtwdmir.supabase.co"
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ocnRxend4cmh2bGRtdHdkbWlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNjUyNzYsImV4cCI6MjA5NTc0MTI3Nn0.KEctPSX1qxX6jMZEWC1Fl0WRNqPp_YMKAnJ2jEz3PzE"

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        // 1. Extraire l'ID depuis les paramètres d'URL (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        async function chargerDetailsProjet() {
            if (!projectId) {
                document.getElementById('loading-state').innerHTML = "<p class='text-red-500'>Aucun identifiant de projet spécifié.</p>";
                return;
            }

            try {
                // 2. Récupérer uniquement le projet correspondant à l'ID
                const { data: projet, error } = await supabase
                    .from('Projets')
                    .select('id, Title, Description, Details')
                    .eq('id', projectId)
                    .single(); // On ne veut qu'une seule ligne

                if (error) throw error;

                if (projet) {
                    // 3. Remplacement des textes dans le HTML
                    document.title = `Project Details | ${projet.Title}`;
                    document.getElementById('project-title').textContent = projet.Title;
                    document.getElementById('project-desc').textContent = projet.Description;
                    
                    // Ici on affiche par défaut la description dans l'Overview
                    document.getElementById('project-details').textContent = projet.Description; 

                    // 4. Génération dynamique des Badges de compétences (Details)
                    const skillsContainer = document.getElementById('project-skills');
                    const skills = projet.Details ? projet.Details.split(',').map(s => s.trim()) : [];
                    
                    skillsContainer.innerHTML = skills.map(skill => `
                        <span class="bg-indigo-600 text-white px-3 py-1 rounded-full text-xs font-medium">${skill}</span>
                    `).join('');

                    // 5. Afficher le contenu principal et masquer l'état de chargement
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                }

            } catch (err) {
                console.error("Erreur de chargement :", err.message);
                document.getElementById('loading-state').innerHTML = `<p class='text-red-500'>Erreur lors du chargement des données : ${err.message}</p>`;
            }
        }

        chargerDetailsProjet();

        // Formulaire de contact standard
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for your message! I will get back to you soon.');
            contactForm.reset();
        });
    </script>
</body>
</html>
